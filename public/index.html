<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BashSearch | Sentinela IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0c0c0c; font-family: 'Fira Code', monospace; color: #e0e0e0; }
        .terminal-glow { color: #00FF00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
        .card-bash { background-color: #161616; border: 1px solid #222; border-left: 4px solid #00FF00; transition: 0.3s; }
        .card-bash:hover { border-left-width: 8px; background-color: #1a1a1a; }
        .input-bash { background: #000; border: 1px solid #333; color: #fff; outline: none; }
        .input-bash:focus { border-color: #00FF00; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        .prose pre { background: #000 !important; border: 1px solid #333; padding: 10px; border-radius: 8px; }
        .prose code { color: #00FF00 !important; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto mb-20">

    <header class="text-center mt-6 mb-8">
        <h1 class="text-3xl font-bold terminal-glow mb-1">root@termux:~# search_</h1>
        <p class="text-[9px] text-gray-500 uppercase tracking-widest">Sentinela v2.3 | Unit: cerebro-fba58</p>
    </header>

    <!-- IA MODULE -->
    <section class="mb-10 bg-[#111] p-5 rounded-2xl border border-zinc-800 shadow-2xl">
        <h2 class="text-[#00FF00] text-[10px] font-bold mb-4 flex items-center gap-2 uppercase tracking-widest">🤖 Sentinela-Bash IA</h2>
        <div class="flex gap-2">
            <input id="ia-prompt" class="flex-1 p-3 rounded-xl input-bash text-sm" placeholder="Perguntar à IA...">
            <button id="ia-btn" class="bg-[#00FF00] text-black px-6 rounded-xl font-bold hover:bg-green-400 transition-all">></button>
        </div>
        <div id="ia-status" class="hidden text-[10px] text-gray-500 mt-4 animate-pulse">⏳ Processando inteligência...</div>
        <div id="ia-results" class="mt-6 space-y-4"></div>
    </section>

    <!-- LOCAL DB MODULE -->
    <section>
        <div class="flex justify-between items-center mb-4 px-1">
            <h2 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Base de Dados Local</h2>
            <select id="langBtn" class="bg-black text-[10px] border border-zinc-700 px-2 py-1 rounded text-green-500 outline-none">
                <option value="pt">PT-BR</option>
                <option value="en">EN-US</option>
                <option value="es">ES-ES</option>
            </select>
        </div>
        <input type="text" id="local-search" class="w-full p-4 rounded-xl input-bash text-sm mb-6" placeholder="Filtrar comandos locais...">
        <ul id="lista-comandos" class="space-y-3"></ul>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAG1gvUh1ggcU0rwesmxsLwuzbrAfHPlLU",
            authDomain: "bash-eee21.firebaseapp.com",
            databaseURL: "https://bash-eee21-default-rtdb.firebaseio.com",
            projectId: "bash-eee21",
            storageBucket: "bash-eee21.firebasestorage.app",
            messagingSenderId: "1068325548191",
            appId: "1:1068325548191:web:3bdbee9c95aacdcbf232aa"
        };

        initializeApp(firebaseConfig);
        const API_URL = "https://bash-search-backend.onrender.com";

        const iaBtn = document.getElementById('ia-btn');
        const iaPrompt = document.getElementById('ia-prompt');
        const iaResults = document.getElementById('ia-results');
        const iaStatus = document.getElementById('ia-status');
        const localSearch = document.getElementById('local-search');
        const listaUl = document.getElementById('lista-comandos');
        const langBtn = document.getElementById('langBtn');

        let baseDados = [];

        async function perguntarIA() {
            const prompt = iaPrompt.value.trim();
            if(!prompt) return;
            iaStatus.classList.remove('hidden');
            iaBtn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                const div = document.createElement('div');
                div.className = 'card-bash p-5 rounded-xl shadow-xl';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3 text-[9px]">
                        <span class="text-green-500 font-bold uppercase font-mono">IA Response</span>
                        <button onclick="window.copy(this)" class="bg-zinc-800 px-2 py-1 rounded hover:bg-green-600">COPIAR</button>
                    </div>
                    <div class="text-sm prose prose-invert max-w-none">${marked.parse(data.resposta)}</div>
                `;
                iaResults.prepend(div);
                iaPrompt.value = '';
            } catch (e) { alert("Erro ao conectar com o Backend."); }
            finally { iaStatus.classList.add('hidden'); iaBtn.disabled = false; }
        }

        async function carregarComandos() {
            try {
                const lang = langBtn.value;
                // Ajustado para o caminho correto relativo à pasta public
                const mapping = { pt: 'lista_cmd_bash.txt', en: 'lista_en.txt', es: 'lista_es.txt' };
                const res = await fetch(`./comandos/${mapping[lang]}`);
                
                if (!res.ok) throw new Error("Arquivo não encontrado");
                
                const texto = await res.text();
                baseDados = texto.split('\n')
                    .filter(line => line.includes(' - '))
                    .map(line => {
                        const parts = line.split(' - ');
                        return { nome: parts[0].trim(), desc: parts[1].trim() };
                    });
                renderizarLista(baseDados);
            } catch (e) {
                console.error(e);
                listaUl.innerHTML = `<li class="text-red-500 text-xs italic">Erro ao carregar lista de comandos (${langBtn.value}).</li>`;
            }
        }

        function renderizarLista(itens) {
            listaUl.innerHTML = itens.map(i => `
                <li onclick="window.copyTxt('${i.nome}')" class="card-bash p-4 rounded-r-xl cursor-pointer group">
                    <div class="flex justify-between items-center">
                        <span class="text-green-400 font-bold text-sm">$ ${i.nome}</span>
                        <span class="opacity-0 group-hover:opacity-100 text-[8px] bg-green-500 text-black px-1.5 py-0.5 rounded">COPIAR</span>
                    </div>
                    <p class="text-gray-500 text-xs mt-1 leading-tight">${i.desc}</p>
                </li>
            `).join('');
        }

        window.copyTxt = (txt) => {
            navigator.clipboard.writeText(txt);
            alert("Copiado!");
        };
        
        window.copy = (btn) => {
            const code = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "COPIADO!";
            setTimeout(() => btn.innerText = "COPIAR", 2000);
        };

        iaBtn.onclick = perguntarIA;
        iaPrompt.onkeypress = (e) => e.key === 'Enter' && perguntarIA();
        langBtn.onchange = carregarComandos;
        localSearch.oninput = (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = baseDados.filter(i => i.nome.toLowerCase().includes(termo) || i.desc.toLowerCase().includes(termo));
            renderizarLista(filtrados);
        };

        carregarComandos();
    </script>
</body>
</html>
